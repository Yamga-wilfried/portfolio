<svg viewBox="0 0 1600 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1730"/>
      <stop offset="55%" stop-color="#10264A"/>
      <stop offset="100%" stop-color="#183565"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8C766"/>
      <stop offset="100%" stop-color="#B4872F"/>
    </linearGradient>
    <pattern id="hexpat" width="84" height="97" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <polygon points="42,0 84,24 84,73 42,97 0,73 0,24" fill="none" stroke="#2C4A80" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1600" height="460" fill="url(#bg)"/>
  <rect width="1600" height="460" fill="url(#hexpat)"/>
  <rect x="0" y="0" width="1600" height="6" fill="url(#gold)"/>

  <polygon points="1360,60 1420,95 1420,165 1360,200 1300,165 1300,95" fill="none" stroke="#D9B25B" stroke-width="2" opacity="0.55"/>
  <polygon points="1460,140 1500,163 1500,210 1460,233 1420,210 1420,163" fill="none" stroke="#D9B25B" stroke-width="1.5" opacity="0.35"/>
  <polygon points="1250,260 1310,295 1310,365 1250,400 1190,365 1190,295" fill="none" stroke="#D9B25B" stroke-width="1.5" opacity="0.25"/>

  <text x="90" y="90" fill="#D9B25B" font-size="18" letter-spacing="4" font-weight="700">MISSION RSSI · GOUVERNANCE &amp; RÉSILIENCE CYBER BANCAIRE</text>

  <text x="88" y="165" fill="#FFFFFF" font-size="54" font-weight="800" letter-spacing="0.5">Piloter la Cyber-Résilience</text>
  <text x="88" y="222" fill="#FFFFFF" font-size="54" font-weight="800" letter-spacing="0.5">d'une Banque Systémique</text>

  <text x="90" y="266" fill="#B9C6E0" font-size="21">Hexagone Bank · Audit de maturité, analyse EBIOS Risk Manager et feuille de route</text>
  <text x="90" y="296" fill="#B9C6E0" font-size="21">cybersécurité 2025-2027, conformes DORA, ISO 27001 et PCI DSS</text>

  <!-- badge pills -->
  <g font-size="16" font-weight="700">
    <g>
      <rect x="90" y="330" width="98" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="139" y="352" fill="#EFD48F" text-anchor="middle">DORA</text>
    </g>
    <g>
      <rect x="200" y="330" width="150" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="275" y="352" fill="#EFD48F" text-anchor="middle">EBIOS RISK MANAGER</text>
    </g>
    <g>
      <rect x="362" y="330" width="132" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="428" y="352" fill="#EFD48F" text-anchor="middle">ISO 27001 / 27005</text>
    </g>
    <g>
      <rect x="506" y="330" width="112" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="562" y="352" fill="#EFD48F" text-anchor="middle">PCI DSS v4.0</text>
    </g>
    <g>
      <rect x="630" y="330" width="112" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="686" y="352" fill="#EFD48F" text-anchor="middle">ISO 22301</text>
    </g>
  </g>

  <line x1="90" y1="392" x2="1520" y2="392" stroke="#2C4A80" stroke-width="1"/>

  <g font-size="15" fill="#8FA3C7">
    <text x="90" y="425"><tspan font-size="26" font-weight="800" fill="#FFFFFF">20</tspan> actifs critiques cartographiés</text>
    <text x="430" y="425"><tspan font-size="26" font-weight="800" fill="#FFFFFF">9</tspan> scénarios de risque EBIOS RM</text>
    <text x="760" y="425"><tspan font-size="26" font-weight="800" fill="#FFFFFF">22 M€</tspan> de trajectoire cyber</text>
    <text x="1120" y="425"><tspan font-size="26" font-weight="800" fill="#FFFFFF">20</tspan> projets · 3 vagues · 2025-2027</text>
  </g>
</svg>
