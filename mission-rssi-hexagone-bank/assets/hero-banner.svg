<svg viewBox="0 0 1600 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1730"/>
      <stop offset="55%" stop-color="#10264A"/>
      <stop offset="100%" stop-color="#183565"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8C766"/>
      <stop offset="100%" stop-color="#B4872F"/>
    </linearGradient>
    <pattern id="hexpat" width="84" height="97" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <polygon points="42,0 84,24 84,73 42,97 0,73 0,24" fill="none" stroke="#2C4A80" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1600" height="460" fill="url(#bg)"/>
  <rect width="1600" height="460" fill="url(#hexpat)"/>
  <rect x="0" y="0" width="1600" height="6" fill="url(#gold)"/>

  <polygon points="1360,120 1420,155 1420,225 1360,260 1300,225 1300,155" fill="none" stroke="#D9B25B" stroke-width="2" opacity="0.55"/>
  <polygon points="1460,200 1500,223 1500,270 1460,293 1420,270 1420,223" fill="none" stroke="#D9B25B" stroke-width="1.5" opacity="0.35"/>
  <polygon points="1250,260 1310,295 1310,365 1250,400 1190,365 1190,295" fill="none" stroke="#D9B25B" stroke-width="1.5" opacity="0.25"/>

  <!-- Hexagone Bank logo mark -->
  <g>
    <polygon points="1300,16 1319.92,27.5 1319.92,50.5 1300,62 1280.08,50.5 1280.08,27.5" fill="#132B54" stroke="#F3F5F9" stroke-width="1.8"/>
    <line x1="1300" y1="16" x2="1300" y2="39" stroke="#D9B25B" stroke-width="1.2"/>
    <line x1="1319.92" y1="27.5" x2="1300" y2="39" stroke="#D9B25B" stroke-width="1.2"/>
    <line x1="1319.92" y1="50.5" x2="1300" y2="39" stroke="#D9B25B" stroke-width="1.2"/>
    <line x1="1300" y1="62" x2="1300" y2="39" stroke="#F3F5F9" stroke-width="1.2"/>
    <line x1="1280.08" y1="50.5" x2="1300" y2="39" stroke="#F3F5F9" stroke-width="1.2"/>
    <line x1="1280.08" y1="27.5" x2="1300" y2="39" stroke="#D9B25B" stroke-width="1.2"/>
    <circle cx="1300" cy="39" r="2.2" fill="#D9B25B"/>

    <line x1="1338" y1="14" x2="1338" y2="64" stroke="url(#gold)" stroke-width="2"/>

    <text x="1354" y="34" fill="#FFFFFF" font-size="20" font-weight="800" font-family="Georgia, 'Times New Roman', serif" letter-spacing="1">HEXAGONE</text>
    <text x="1354" y="53" fill="#D9B25B" font-size="16" font-weight="800" font-family="Georgia, 'Times New Roman', serif" letter-spacing="3">BANK</text>
    <text x="1354" y="65" fill="#B9C6E0" font-size="7.5" font-weight="700" letter-spacing="1.3">SÉCURITÉ · CONFIANCE · RÉSILIENCE</text>
  </g>

  <text x="90" y="90" fill="#D9B25B" font-size="18" letter-spacing="4" font-weight="700">MISSION RSSI · GOUVERNANCE &amp; RÉSILIENCE CYBER BANCAIRE</text>

  <text x="88" y="165" fill="#FFFFFF" font-size="54" font-weight="800" letter-spacing="0.5">Piloter la Cyber-Résilience</text>
  <text x="88" y="222" fill="#FFFFFF" font-size="54" font-weight="800" letter-spacing="0.5">d'une Banque Systémique</text>

  <text x="90" y="266" fill="#B9C6E0" font-size="21">Hexagone Bank · Audit de maturité, analyse EBIOS Risk Manager et feuille de route</text>
  <text x="90" y="296" fill="#B9C6E0" font-size="21">cybersécurité 2025-2027, conformes DORA, ISO 27001 et PCI DSS</text>

  <!-- badge pills -->
  <g font-size="16" font-weight="700">
    <g>
      <rect x="90" y="330" width="98" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="139" y="352" fill="#EFD48F" text-anchor="middle">DORA</text>
    </g>
    <g>
      <rect x="200" y="330" width="120" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="260" y="352" fill="#EFD48F" text-anchor="middle">EBIOS RM</text>
    </g>
    <g>
      <rect x="332" y="330" width="132" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="398" y="352" fill="#EFD48F" text-anchor="middle">ISO 27001 / 27005</text>
    </g>
    <g>
      <rect x="476" y="330" width="112" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="532" y="352" fill="#EFD48F" text-anchor="middle">PCI DSS v4.0</text>
    </g>
    <g>
      <rect x="600" y="330" width="112" height="34" rx="17" fill="none" stroke="#D9B25B" stroke-width="1.3"/>
      <text x="656" y="352" fill="#EFD48F" text-anchor="middle">ISO 22301</text>
    </g>
  </g>

  <line x1="90" y1="392" x2="1520" y2="392" stroke="#2C4A80" stroke-width="1"/>

  <g font-size="15" fill="#8FA3C7">
    <text x="90" y="425"><tspan font-size="26" font-weight="800" fill="#FFFFFF">20</tspan> actifs critiques cartographiés</text>
    <text x="430" y="425"><tspan font-size="26" font-weight="800" fill="#FFFFFF">9</tspan> scénarios de risque EBIOS RM</text>
    <text x="760" y="425"><tspan font-size="26" font-weight="800" fill="#FFFFFF">22 M€</tspan> de trajectoire cyber</text>
    <text x="1120" y="425"><tspan font-size="26" font-weight="800" fill="#FFFFFF">20</tspan> projets · 3 vagues · 2025-2027</text>
  </g>
</svg>
