  <text x="380" y="400" text-anchor="middle" font-size="12.5" font-style="italic" fill="#7B241C">RSSI rattaché à la DSI, pas d'accès direct au COMEX</text>
  <text x="1220" y="330" text-anchor="middle" font-size="12.5" font-style="italic" fill="#14532D">RSSI et DPO rattachés directement à la Direction Générale</text>
