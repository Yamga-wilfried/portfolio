  <line x1="30" y1="600" x2="1170" y2="600" stroke="#E2E6EF" stroke-width="1"/>
  <text x="30" y="614" fill="#9CA3AF" font-size="11.5">Gravité : G1 Mineur → G4 Critique · Vraisemblance : V1 Peu vraisemblable → V4 Quasi-certain (échelle ANSSI EBIOS Risk Manager)</text>
