    <rect x="452" y="456" width="230" height="28" rx="14" fill="#FFF6DD"/><text x="567" y="474" text-anchor="middle">P03 · Gouvernance IAM</text>
    <rect x="694" y="456" width="220" height="28" rx="14" fill="#FFF6DD"/><text x="804" y="474" text-anchor="middle">P06 · CSPM Cloud Azure</text>
    <rect x="926" y="456" width="200" height="28" rx="14" fill="#FFF6DD"/><text x="1026" y="474" text-anchor="middle">P16 · DLP</text>
    <rect x="1138" y="456" width="200" height="28" rx="14" fill="#FFF6DD"/><text x="1238" y="474" text-anchor="middle">P18 · SOC renforcé</text>
  </g>

  <!-- Wave 3 -->
  <rect x="820" y="524" width="720" height="26" rx="13" fill="#10264A"/>
  <text x="835" y="542" fill="#FFFFFF" font-size="13" font-weight="700">V3 · TRANSFORMATION &amp; RÉSILIENCE 2026-2027</text>
  <rect x="820" y="560" width="720" height="46" rx="10" fill="#F1F4FA" stroke="#D7DEEC"/>
  <text x="842" y="580" fill="#10264A" font-size="14" font-weight="800">5 projets · 9,0 M€</text>
  <text x="842" y="598" fill="#1F2937" font-size="12.5">Zero Trust (P05), résilience fournisseurs (P19), consolidation de la trajectoire de maturité cible.</text>
