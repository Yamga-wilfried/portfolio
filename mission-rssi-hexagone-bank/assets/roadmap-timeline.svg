    <rect x="310" y="284" width="230" height="28" rx="14" fill="#E9F7EF"/><text x="425" y="302" text-anchor="middle">P09 · Accès prestataires sécurisés</text>
    <rect x="552" y="284" width="230" height="28" rx="14" fill="#E9F7EF"/><text x="667" y="302" text-anchor="middle">P14 · Classification des données</text>
    <rect x="794" y="284" width="240" height="28" rx="14" fill="#E9F7EF"/><text x="914" y="302" text-anchor="middle">P20 · Gouvernance SSI &amp; sensibilisation</text>
