    <text x="580" y="106">2026</text>
    <text x="1060" y="106">2027</text>
    <text x="1520" y="106">2028</text>
  </g>
  <line x1="100" y1="112" x2="100" y2="124" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="580" y1="112" x2="580" y2="124" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="1060" y1="112" x2="1060" y2="124" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="1540" y1="112" x2="1540" y2="124" stroke="#94A3B8" stroke-width="1.5"/>

